<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ummu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fce4ec; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2.5s ease-in-out;
        }

        h1 {
            /* Font tulisan tangan untuk "Hi, Ummu!" */
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #f06292;
            margin-bottom: 40px; /* Jarak lebih lebar karena teks musik dihapus */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .btn-start {
            /* Tombol lonjong putih bersih */
            background-color: #ffffff;
            color: #f06292;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(240, 98, 146, 0.15);
            border: none;
            cursor: pointer;
        }

        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(240, 98, 146, 0.25);
            background-color: #fdf2f5;
        }

        /* Animasi muncul halus saat halaman dibuka */
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Penyesuaian untuk layar HP */
        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            .btn-start { padding: 12px 35px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, Ummu!</h1>
        
        <!-- Tombol Start with Love -->
        <a href="halaman_selanjutnya.html" class="btn-start">
            Start with Love ❤️
        </a>
    </div>

</body>
</html>
