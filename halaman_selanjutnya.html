<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Note 🎓</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --color-bg: #fce4ec;
            --color-env: #f06292;
            --color-env-dark: #d81b60;
            --color-paper: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Memastikan semua ke tengah layar */
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        /* Container amplop */
        .envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Kertas mulai dari dasar amplop */
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--color-env);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 0 0 10px 10px;
            z-index: 3;
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            border-top: 115px solid var(--color-env-dark);
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s ease;
        }

        .letter {
            position: absolute;
            bottom: 10px;
            width: 90%;
            height: 90%;
            background: var(--color-paper);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 2;
            border-radius: 5px;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter h2 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .letter p {
            font-size: 0.9rem;
            color: #444;
            font-weight: 600;
        }

        /* Tombol OPEN */
        .btn-main {
            margin-top: 60px; /* Jarak dari amplop */
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid #d81b60;
            cursor: pointer;
            transition: 0.3s;
            background-color: var(--color-env-dark);
            color: white;
            z-index: 10;
        }

        /* Tombol Next (Custom Style) */
        #nextBtn {
            background-color: white;
            color: #d81b60;
            display: none; /* Awalnya sembunyi */
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Saat Amplop Terbuka */
        .open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .letter {
            opacity: 1;
            /* Kita naikkan hanya setengahnya supaya pas di tengah badan amplop */
            transform: translateY(-100px); 
            z-index: 4;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="envelope-container" id="mainContainer">
        <div class="envelope"></div>
        <div class="letter">
            <h2>Happy Graduation, Ummu!</h2>
            <p>I am so proud of you ✨</p>
        </div>
    </div>

    <button class="btn-main" id="openBtn" onclick="openEnvelope()">OPEN</button>
    
    <button class="btn-main" id="nextBtn" onclick="window.location.href='game.html'">Next →</button>

    <script>
        function openEnvelope() {
            const container = document.getElementById('mainContainer');
            const btnOpen = document.getElementById('openBtn');
            const btnNext = document.getElementById('nextBtn');
            
            container.classList.add('open');
            btnOpen.classList.add('hidden');
            
            // Confetti Meriah
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Tombol Next muncul perlahan setelah 2.5 detik
            setTimeout(() => {
                btnNext.style.display = "block";
                setTimeout(() => { 
                    btnNext.style.opacity = "1"; 
                }, 100);
            }, 2500);
        }
    </script>
</body>
</html>
